<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma de Gestion de Auditorias | INDUSECC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>

<body>
  <div class="bg-layer"></div>

  <section id="iso-onboarding" class="onboarding">
    <div class="onboarding-card">
      <p class="eyebrow">INDUSECC</p>
      <h1>Plataforma de Gestion de Auditorias</h1>
      <p class="subtitle">Elige primero el marco normativo y despues arrancamos la auditoria completa.</p>
      <div id="iso-options" class="iso-grid"></div>
      <div class="onboarding-actions">
        <button id="start-audit" class="btn btn-primary" disabled>Iniciar auditoria</button>
      </div>
    </div>
  </section>

  <main id="app" class="app hidden">
    <header class="app-header">
      <div class="brand-wrap">
        <img src="assets/img/logo_indusecc.png" alt="Logo" class="brand-logo" />
        <div>
          <p class="eyebrow">INDUSECC</p>
          <h2>Centro de Gestion de Auditorias</h2>
        </div>
      </div>
      <div class="header-meta">
        <span id="active-iso" class="iso-chip">Sin norma seleccionada</span>
        <button id="change-iso" class="btn btn-secondary">Cambiar ISO</button>
      </div>
    </header>

    <section class="workspace">
      <aside class="panel project-panel">
        <h3>Ficha de proyecto</h3>
        <div class="form-grid">
          <label>Empresa/Proyecto
            <input type="text" id="project-name" placeholder="Nombre del proyecto" />
          </label>
          <label>Auditor lider
            <input type="text" id="auditor-name" placeholder="Nombre del auditor" />
          </label>
          <label>Sitio auditado
            <input type="text" id="audit-site" placeholder="Planta, sede o unidad" />
          </label>
          <label>Fecha
            <input type="date" id="audit-date" />
          </label>
          <label class="full">Alcance
            <textarea id="audit-scope" rows="3" placeholder="Alcance, procesos, limitaciones y objetivos."></textarea>
          </label>
        </div>

        <div class="metrics" id="metrics"></div>

        <div class="panel-actions">
          <button id="export-pdf" class="btn btn-primary">Exportar PDF</button>
          <button id="clear-project" class="btn btn-danger">Limpiar proyecto</button>
        </div>
      </aside>

      <section class="panel checklist-panel">
        <div class="panel-head">
          <h3>Checklist de auditoria</h3>
          <p id="iso-updated-note" class="muted"></p>
        </div>
        <div id="checklist-root" class="checklist-root"></div>
      </section>
    </section>
  </main>

  <section id="camera-modal" class="camera-modal hidden" aria-hidden="true">
    <div class="camera-card">
      <h3>Tomar fotografia de evidencia</h3>
      <video id="camera-video" autoplay playsinline></video>
      <canvas id="camera-canvas" class="hidden"></canvas>
      <div class="camera-actions">
        <button id="capture-photo" class="btn btn-primary">Capturar</button>
        <button id="cancel-camera" class="btn btn-secondary">Cancelar</button>
      </div>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="assets/js/iso-library.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
